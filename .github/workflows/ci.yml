name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup .NET 6 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 6.0.428

      - name: Restore dependencies
        run: dotnet restore IndustrialVisionHost.sln

      - name: Build Release
        run: dotnet build IndustrialVisionHost.sln -c Release --no-restore

      - name: Run automated tests
        run: dotnet test tests\IndustrialVisionHost.Tests\IndustrialVisionHost.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"
